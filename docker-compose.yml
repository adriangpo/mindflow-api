services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindflow-api
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      POSTGRES_URL: ${POSTGRES_URL:-postgresql+asyncpg://${POSTGRES_USER:-mindflow}:${POSTGRES_PASSWORD:-mindflow}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-mindflow}}
      API_PREFIX: ${API_PREFIX:-/api}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: mindflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mindflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindflow}
      POSTGRES_DB: ${POSTGRES_DB:-mindflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindflow} -d ${POSTGRES_DB:-mindflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:16-alpine
    container_name: mindflow-postgres-test
    env_file:
      - .env.test
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER:-mindflow_test}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-mindflow_test}
      POSTGRES_DB: ${TEST_POSTGRES_DB:-mindflow_test}
    profiles:
      - test
    ports:
      - "${TEST_POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  postgres_data:
